<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skat - Settings</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="main-menu" class="menu-overlay">
        <header class="menu-header">
            <div class="header-left" id="btn-logo-home" style="cursor: pointer;" onclick="window.location.href='index.html'">
                <div class="app-logo">S</div>
                <span class="app-name">Skat</span>
            </div>
            <nav class="header-right">
                <button id="btn-show-tutorial" class="nav-link" data-i18n="tutorial" onclick="window.location.href='tutorial.html'">Tutorial</button>
                <button id="btn-show-stats" class="nav-link" data-i18n="statistics" onclick="window.location.href='stats.html'">Statistics</button>
                <button id="btn-show-settings" class="nav-link" data-i18n="settings" onclick="window.location.href='settings.html'">Settings</button>
            </nav>
        </header>

        <div class="menu-content" id="settings-view">
            <header class="view-header">
                <h1 data-i18n="settings">Settings</h1>
            </header>

            <div class="settings-grid">
                <!-- Profile Section -->
                <div class="settings-card">
                    <h3 data-i18n="nickname">Nickname</h3>
                    <div class="settings-control">
                        <input type="text" id="input-nickname" class="nickname-input" maxlength="12" placeholder="Dein Name">
                    </div>
                </div>

                <!-- Language Section -->
                <div class="settings-card">
                    <h3 data-i18n="language">Language</h3>
                    <div class="settings-control">
                        <div class="language-switch">
                            <span class="lang-label">DE</span>
                            <label class="toggle-label mini">
                                <input type="checkbox" id="chk-language">
                                <span class="toggle-switch"></span>
                            </label>
                            <span class="lang-label">EN</span>
                        </div>
                    </div>
                </div>

                <!-- Appearance Section -->
                <div class="settings-card">
                    <h3 data-i18n="theme">Theme</h3>
                    <div class="settings-control">
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="theme" value="dark" checked>
                                <span class="radio-custom"></span>
                                Dark
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="theme" value="light">
                                <span class="radio-custom"></span>
                                Light
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Rules Section -->
                <div class="settings-card">
                    <h3 data-i18n="rule_set">Regeln</h3>
                    <div class="settings-control">
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="ruleSet" value="tournament" checked>
                                <span class="radio-custom"></span>
                                <span data-i18n="tournament">Turnier</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="ruleSet" value="pub">
                                <span class="radio-custom"></span>
                                <span data-i18n="pub">Kneipe</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Gameplay Section -->
                <div class="settings-card">
                    <h3 data-i18n="card_animation">Animation</h3>
                    <div class="settings-control">
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="animSpeed" value="0.3">
                                <span class="radio-custom"></span>
                                <span data-i18n="fast">Schnell</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="animSpeed" value="0.45" checked>
                                <span class="radio-custom"></span>
                                <span data-i18n="normal">Normal</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="animSpeed" value="0.65">
                                <span class="radio-custom"></span>
                                <span data-i18n="slow">Langsam</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Preferences Section -->
                <div class="settings-card">
                    <h3 data-i18n="preferences">Preferences</h3>
                    <div class="settings-control stacked">
                        <label class="toggle-label">
                            <input type="checkbox" id="chk-live-score">
                            <span class="toggle-switch"></span>
                            <span data-i18n="show_live_points">Punkte live anzeigen</span>
                        </label>
                        <label class="toggle-label">
                            <input type="checkbox" id="chk-sound">
                            <span class="toggle-switch"></span>
                            <span data-i18n="activate_sounds">Sounds aktivieren</span>
                        </label>
                        <label class="toggle-label">
                            <input type="checkbox" id="chk-drag-drop">
                            <span class="toggle-switch"></span>
                            <span data-i18n="drag_drop">Drag & Drop aktivieren</span>
                        </label>
                        <label class="toggle-label">
                            <input type="checkbox" id="chk-battery-saver">
                            <span class="toggle-switch"></span>
                            <span data-i18n="battery_saver">Akkusparmodus</span>
                        </label>
                    </div>
                </div>

                <!-- Data Section -->
                <div class="settings-card danger-card">
                    <h3 data-i18n="data">Data</h3>
                    <div class="settings-control">
                        <button id="btn-delete-stats" class="btn danger" style="width: 100%;" data-i18n="delete_stats">Statistiken löschen</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="js/settings.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.appSettings = new Settings();
            const ui = new UI();
            ui.bindSettingsForm(window.appSettings);
            ui.updateLanguageUI();
        });
    </script>
</body>

</html>
