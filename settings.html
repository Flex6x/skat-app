<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skat-König - Settings</title>
    <link rel="icon" type="image/jpeg" href="media/logo.jpg">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    </head>

    <body>
    <!-- Main Start Menu -->
    <div id="main-menu" class="menu-overlay">
        <header class="menu-header">
            <div class="header-left" id="btn-logo-home" style="cursor: pointer;" onclick="window.location.href='index.html'">
                <img src="media/logo.jpg" alt="Skat-König Logo" class="app-logo-img">
                <span class="app-name">Skat-König</span>
            </div>
            <nav class="header-right">
                <button id="btn-show-rules" class="nav-link" data-i18n="rules" onclick="window.location.href='rules.html'">Regeln</button>
                <button id="btn-show-stats" class="nav-link" data-i18n="statistics" onclick="window.location.href='stats.html'">Statistics</button>
                <button id="btn-show-settings" class="nav-link" data-i18n="settings" onclick="window.location.href='settings.html'">Settings</button>
            </nav>
        </header>

        <div class="menu-content" id="settings-view">
            <header class="view-header">
                <h1 data-i18n="settings">Settings</h1>
            </header>

            <div class="settings-grid">
                <!-- Profile Section -->
                <div class="settings-card">
                    <h3 data-i18n="nickname">Nickname</h3>
                    <div class="settings-control">
                        <input type="text" id="input-nickname" class="nickname-input" maxlength="12" data-i18n-placeholder="placeholder_nickname" placeholder="Dein Name">
                    </div>
                </div>

                <!-- Language Section -->
                <div class="settings-card">
                    <h3 data-i18n="language">Language</h3>
                    <div class="settings-control">
                        <div class="language-switch">
                            <span class="lang-label">DE</span>
                            <label class="toggle-label mini">
                                <input type="checkbox" id="chk-language">
                                <span class="toggle-switch"></span>
                            </label>
                            <span class="lang-label">EN</span>
                        </div>
                    </div>
                </div>

                <!-- Appearance Section -->
                <div class="settings-card">
                    <h3 data-i18n="theme">Theme</h3>
                    <div class="settings-control">
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="theme" value="dark" checked>
                                <span class="radio-custom"></span>
                                <span data-i18n="theme_dark">Dark</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="theme" value="light">
                                <span class="radio-custom"></span>
                                <span data-i18n="theme_light">Light</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Rules Section -->
                <div class="settings-card">
                    <h3 data-i18n="rule_set">Regeln</h3>
                    <div class="settings-control">
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="ruleSet" value="tournament" checked>
                                <span class="radio-custom"></span>
                                <span data-i18n="tournament">Turnier</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="ruleSet" value="pub">
                                <span class="radio-custom"></span>
                                <span data-i18n="pub">Kneipe</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Gameplay Section -->
                <div class="settings-card">
                    <h3 data-i18n="card_animation">Animation</h3>
                    <div class="settings-control">
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="animSpeed" value="0.3">
                                <span class="radio-custom"></span>
                                <span data-i18n="fast">Schnell</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="animSpeed" value="0.45" checked>
                                <span class="radio-custom"></span>
                                <span data-i18n="normal">Normal</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="animSpeed" value="0.65">
                                <span class="radio-custom"></span>
                                <span data-i18n="slow">Langsam</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Preferences Section -->
                <div class="settings-card">
                    <h3 data-i18n="preferences">Preferences</h3>
                    <div class="settings-control stacked">
                        <label class="toggle-label">
                            <input type="checkbox" id="chk-sound">
                            <span class="toggle-switch"></span>
                            <span data-i18n="activate_sounds">Sounds aktivieren</span>
                        </label>
                        <label class="toggle-label">
                            <input type="checkbox" id="chk-drag-drop">
                            <span class="toggle-switch"></span>
                            <span data-i18n="drag_drop">Drag & Drop aktivieren</span>
                        </label>
                        <label class="toggle-label">
                            <input type="checkbox" id="chk-battery-saver">
                            <span class="toggle-switch"></span>
                            <span data-i18n="battery_saver">Akkusparmodus</span>
                        </label>
                    </div>
                </div>

                <!-- Data Section -->
                <div class="settings-card danger-card hidden" id="data-settings-card">
                    <h3 data-i18n="data">Data</h3>
                    <div class="settings-control stacked">
                        <button id="btn-transfer-stats" class="btn primary hidden" style="width: 100%;" data-i18n="transfer_stats">Stats auf Acc übertragen</button>
                    </div>
                </div>
            </div>

            <!-- Save / Back Buttons -->
            <div class="settings-actions">
                <button id="btn-save-settings" class="btn primary save-settings-btn" data-i18n="save_settings">Speichern</button>
                <button class="btn secondary" data-i18n="back" onclick="window.location.href='index.html'">Zurück</button>
                <p id="settings-save-status" class="settings-save-status hidden"></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.appSettings = new Settings();
            window.ui = new UI();
            window.ui.updateLanguageUI();

            const settings = window.appSettings;
            const s = settings.current;

            // Create a draft copy of settings (changes go here until Save)
            const draft = { ...s };
            // Remember original theme to revert if not saved
            const originalTheme = s.theme;
            const originalLanguage = s.language;

            // --- Populate form from current settings ---
            const nicknameInput = document.getElementById('input-nickname');
            if (nicknameInput) nicknameInput.value = s.nickname;

            const langChk = document.getElementById('chk-language');
            if (langChk) langChk.checked = (s.language === 'en');

            document.querySelectorAll('input[name="theme"]').forEach(r => {
                r.checked = (r.value === s.theme);
            });
            document.querySelectorAll('input[name="ruleSet"]').forEach(r => {
                r.checked = (r.value === s.ruleSet);
            });
            document.querySelectorAll('input[name="animSpeed"]').forEach(r => {
                r.checked = (parseFloat(r.value) === s.animationSpeed);
            });

            const liveScoreChk = document.getElementById('chk-live-score');
            if (liveScoreChk) liveScoreChk.checked = s.showLiveScore;
            const soundChk = document.getElementById('chk-sound');
            if (soundChk) soundChk.checked = s.soundEnabled;
            const dragDropChk = document.getElementById('chk-drag-drop');
            if (dragDropChk) dragDropChk.checked = s.dragDropEnabled;
            const batterySaverChk = document.getElementById('chk-battery-saver');
            if (batterySaverChk) batterySaverChk.checked = s.batterySaver;

            // --- Bind form changes to draft (NOT to real settings) ---
            if (nicknameInput) {
                nicknameInput.oninput = () => { draft.nickname = nicknameInput.value || 'Du'; };
            }
            if (langChk) {
                langChk.onchange = () => {
                    draft.language = langChk.checked ? 'en' : 'de';
                    // Preview language change live
                    settings.current.language = draft.language;
                    window.ui.updateLanguageUI();
                };
            }
            document.querySelectorAll('input[name="theme"]').forEach(r => {
                r.addEventListener('change', () => {
                    draft.theme = r.value;
                    // Preview theme change live
                    settings.applyTheme(r.value);
                });
            });
            document.querySelectorAll('input[name="ruleSet"]').forEach(r => {
                r.addEventListener('change', () => { draft.ruleSet = r.value; });
            });
            document.querySelectorAll('input[name="animSpeed"]').forEach(r => {
                r.addEventListener('change', () => { draft.animationSpeed = parseFloat(r.value); });
            });
            if (liveScoreChk) {
                liveScoreChk.addEventListener('change', () => { draft.showLiveScore = liveScoreChk.checked; });
            }
            if (soundChk) {
                soundChk.addEventListener('change', () => { draft.soundEnabled = soundChk.checked; });
            }
            if (dragDropChk) {
                dragDropChk.addEventListener('change', () => { draft.dragDropEnabled = dragDropChk.checked; });
            }
            if (batterySaverChk) {
                batterySaverChk.addEventListener('change', () => { draft.batterySaver = batterySaverChk.checked; });
            }

            // --- Save button: commit draft to real settings ---
            const saveBtn = document.getElementById('btn-save-settings');
            const saveStatus = document.getElementById('settings-save-status');
            if (saveBtn) {
                saveBtn.onclick = () => {
                    // Apply all draft values to real settings
                    Object.keys(draft).forEach(key => {
                        settings.set(key, draft[key]);
                    });
                    settings.save();

                    // Show success feedback
                    if (saveStatus) {
                        saveStatus.textContent = '✓ ' + (draft.language === 'en' ? 'Settings saved!' : 'Einstellungen gespeichert!');
                        saveStatus.classList.remove('hidden');
                        saveStatus.classList.add('fade-in');
                        setTimeout(() => {
                            saveStatus.classList.add('hidden');
                            saveStatus.classList.remove('fade-in');
                        }, 2500);
                    }
                };
            }

            // --- Transfer Stats (independent of save) ---
            const transferBtn = document.getElementById('btn-transfer-stats');
            const dataCard = document.getElementById('data-settings-card');
            if (transferBtn && dataCard) {
                const canMigrate = window.auth && window.auth.isLoggedIn() && window.storageService && window.storageService.hasLocalDataToMigrate();
                if (canMigrate) {
                    transferBtn.classList.remove('hidden');
                    dataCard.classList.remove('hidden');
                } else {
                    transferBtn.classList.add('hidden');
                    dataCard.classList.add('hidden');
                }
                transferBtn.onclick = async () => {
                    const msg = draft.language === 'en'
                        ? 'Warning: Existing account statistics will be overwritten by your local data. Do you really want to proceed?'
                        : 'Warnung: Bestehende Account-Statistiken werden durch deine lokalen Daten überschrieben. Willst du wirklich fortfahren?';
                    
                    if (window.confirm(msg)) {
                        const result = await window.storageService.migrateManual();
                        if (result.success) {
                            if (saveStatus) {
                                saveStatus.textContent = draft.language === 'en' ? 'Statistics successfully transferred!' : 'Statistiken erfolgreich übertragen!';
                                saveStatus.classList.remove('hidden');
                                setTimeout(() => saveStatus.classList.add('hidden'), 2500);
                            }
                            transferBtn.classList.add('hidden');
                            dataCard.classList.add('hidden');
                        } else {
                            if (saveStatus) {
                                saveStatus.textContent = (draft.language === 'en' ? 'Error: ' : 'Fehler: ') + result.error;
                                saveStatus.classList.remove('hidden');
                                setTimeout(() => saveStatus.classList.add('hidden'), 5000);
                            }
                        }
                    }
                };
            }

            // --- Revert on navigation away (browser back, etc.) ---
            window.addEventListener('beforeunload', () => {
                // Revert theme and language if not saved
                settings.applyTheme(settings.current.theme);
            });
        });
    </script>
</body>

</html>
