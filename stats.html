<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skat-König - Statistics</title>
    <link rel="icon" type="image/jpeg" href="media/logo.jpg">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    </head>

    <body>
    <!-- Main Start Menu -->
    <div id="main-menu" class="menu-overlay">
        <header class="menu-header">
            <div class="header-left" id="btn-logo-home" style="cursor: pointer;" onclick="window.location.href='index.html'">
                <img src="media/logo.jpg" alt="Skat-König Logo" class="app-logo-img">
                <span class="app-name">Skat-König</span>
            </div>
            <nav class="header-right">
                <button id="btn-show-tutorial" class="nav-link" data-i18n="tutorial" onclick="window.location.href='tutorial.html'">Tutorial</button>
                <button id="btn-show-stats" class="nav-link" data-i18n="statistics" onclick="window.location.href='stats.html'">Statistics</button>
                <button id="btn-show-settings" class="nav-link" data-i18n="settings" onclick="window.location.href='settings.html'">Settings</button>
            </nav>
        </header>

        <div class="menu-content" id="stats-view">
            <header class="view-header">
                <h1 data-i18n="statistics">Statistics</h1>
            </header>

            <!-- Tab Navigation -->
            <div class="stats-tabs-nav">
                <button class="stats-tab-btn active" data-tab="overview" onclick="ui.switchStatsTab('overview')">
                    <span data-i18n="overview">Übersicht</span>
                </button>
                <button class="stats-tab-btn" data-tab="history" onclick="ui.switchStatsTab('history')">
                    <span data-i18n="game_history">Spielverlauf</span>
                </button>
                <button class="stats-tab-btn" data-tab="badges" onclick="ui.switchStatsTab('badges')">
                    <span data-i18n="badges">Badges</span>
                </button>
                <button class="stats-tab-btn" data-tab="leaderboard" onclick="ui.switchStatsTab('leaderboard')">
                    <span data-i18n="leaderboard">Bestenliste</span>
                </button>
            </div>

            <div id="user-detail-header" class="user-detail-info hidden">
                <button class="btn mini-btn" onclick="ui.closeUserDetail()" style="margin-bottom: 10px;">&larr; <span data-i18n="back">Zurück</span></button>
                <h2 id="detail-user-name">Username</h2>
            </div>

            <!-- Tab 1: Overview -->
            <div class="stats-overview" id="stats-overview">
                <div class="stats-dashboard" id="stats-main-dashboard">
                    <div class="stat-card">
                        <span class="stat-label" data-i18n="total_lists">Total Lists</span>
                        <span id="stat-total-games" class="stat-value">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label" data-i18n="win_ratio">Win Ratio</span>
                        <span id="stat-win-ratio" class="stat-value">0%</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label" data-i18n="best_streak">Best Streak</span>
                        <span id="stat-win-streak" class="stat-value">0</span>
                    </div>
                </div>

                <!-- New Overall Totals Section -->
                <div class="stats-dashboard secondary-stats" id="stats-secondary-dashboard">
                    <div class="stat-card mini">
                        <span class="stat-label" data-i18n="suit_grand">Grand</span>
                        <span id="stat-total-grand" class="stat-value">0</span>
                    </div>
                    <div class="stat-card mini">
                        <span class="stat-label" data-i18n="suit_null">Null</span>
                        <span id="stat-total-null" class="stat-value">0</span>
                    </div>
                    <div class="stat-card mini">
                        <span class="stat-label" data-i18n="hand">Hand</span>
                        <span id="stat-total-hand" class="stat-value">0</span>
                    </div>
                    <div class="stat-card mini">
                        <span class="stat-label" data-i18n="schneider">Schneider</span>
                        <span id="stat-total-schneider" class="stat-value">0</span>
                    </div>
                    <div class="stat-card mini">
                        <span class="stat-label" data-i18n="schwarz">Schwarz</span>
                        <span id="stat-total-schwarz" class="stat-value">0</span>
                    </div>
                    <div class="stat-card mini">
                        <span class="stat-label" data-i18n="badge_rollmops">Rollmops</span>
                        <span id="stat-total-rollmops" class="stat-value">0</span>
                    </div>
                    <div class="stat-card mini">
                        <span class="stat-label" data-i18n="ramsch">Ramsch</span>
                        <span id="stat-total-ramsch" class="stat-value">0</span>
                    </div>
                    <div class="stat-card mini">
                        <span class="stat-label" data-i18n="grand_ouvert">Grand Ouvert</span>
                        <span id="stat-total-grand-ouvert" class="stat-value">0</span>
                    </div>
                    <div class="stat-card mini">
                        <span class="stat-label" data-i18n="null_ouvert">Null Ouvert</span>
                        <span id="stat-total-null-ouvert" class="stat-value">0</span>
                    </div>
                </div>
            </div>

            <!-- Tab 2: Game History -->
            <div class="stats-history hidden" id="stats-history">
                <div class="stats-table-full-container">
                    <table id="stats-table">
                        <thead>
                            <tr>
                                <th data-i18n="date">Datum</th>
                                <th data-i18n="winner">Gewinner</th>
                                <th data-i18n="rounds">Runden</th>
                                <th data-i18n="rule_set">Regeln</th>
                                <th data-i18n="pts_aicore">Aicore</th>
                                <th data-i18n="pts_aiden">Aiden</th>
                                <th id="stats-player-name-head">Du</th>
                            </tr>
                        </thead>
                        <tbody id="stats-table-body">
                            <!-- Filled by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Tab 3: Badges -->
            <div class="stats-badges hidden" id="stats-badges">
                <div class="badges-grid" id="badges-grid">
                    <!-- Badges will be rendered here -->
                </div>
            </div>

            <!-- Tab 4: Leaderboard -->
            <div class="stats-leaderboard hidden" id="stats-leaderboard">
                <div class="stats-table-full-container">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>Rang</th>
                                <th>User</th>
                                <th>Gewonnene Listen</th>
                                <th>Gesamtlisten</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-table-body">
                            <!-- Filled by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- Stats Modal Popup -->
    <div id="stats-modal" class="stats-modal-overlay hidden">
        <div class="stats-modal-content">
            <header class="modal-header">
                <h2 id="detail-user-name">User Stats</h2>
                <button class="btn-close-modal" onclick="ui.closeUserDetail()">×</button>
            </header>
            <div class="modal-body" id="modal-body-content">
                <!-- User details (cloned overview/history/badges) will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.appSettings = new Settings();
            window.ui = new UI();
            window.ui.updateLanguageUI();
            window.ui.renderStats();
        });
    </script>
</body>

</html>
