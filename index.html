<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skat - Minimalist Web Game</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Main Start Menu -->
    <div id="main-menu" class="menu-overlay">
        <header class="menu-header">
            <div class="header-left" id="btn-logo-home" style="cursor: pointer;">
                <div class="app-logo">S</div>
                <span class="app-name">Skat</span>
            </div>
            <nav class="header-right">
                <button id="btn-show-tutorial" class="nav-link" data-i18n="tutorial" onclick="window.location.href='tutorial.html'">Tutorial</button>
                <button id="btn-show-stats" class="nav-link" data-i18n="statistics" onclick="window.location.href='stats.html'">Statistics</button>
                <button id="btn-show-settings" class="nav-link" data-i18n="settings" onclick="window.location.href='settings.html'">Settings</button>
            </nav>
        </header>

        <div class="menu-content hero-section" id="menu-primary">
            <h1 class="glow-text">Skat</h1>
            <div class="menu-buttons">
                <button id="btn-start-game" class="btn primary play-now-btn" onclick="window.location.href='play.html'">Play Now</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/settings.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.appSettings = new Settings();
            const ui = new UI();
            ui.updateLanguageUI();
            
            // Auto-start tutorial for first time users
            const isFirstVisit = !localStorage.getItem('skat_tutorial_completed');
            if (isFirstVisit) {
                const msg = ui.getTranslation('tutorial') + "?";
                setTimeout(() => {
                    if (confirm(msg)) {
                        window.location.href = 'tutorial.html';
                    } else {
                        localStorage.setItem('skat_tutorial_completed', 'true');
                    }
                }, 1000);
            }

        });
    </script>
</body>

</html>
