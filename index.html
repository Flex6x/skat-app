<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skat-König</title>
    <link rel="icon" type="image/jpeg" href="media/logo.jpg">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Main Start Menu -->
    <div id="main-menu" class="menu-overlay">
        <header class="menu-header">
            <div class="header-left" id="btn-logo-home" style="cursor: pointer;">
                <img src="media/logo.jpg" alt="Skat-König Logo" class="app-logo-img">
                <span class="app-name">Skat-König</span>
            </div>
            <nav class="header-right">
                <button id="btn-show-rules" class="nav-link" data-i18n="rules" onclick="window.location.href='rules.html'">Regeln</button>
                <button id="btn-show-stats" class="nav-link" data-i18n="statistics" onclick="window.location.href='stats.html'">Statistics</button>
                <button id="btn-show-settings" class="nav-link" data-i18n="settings" onclick="window.location.href='settings.html'">Settings</button>
            </nav>
        </header>

        <div class="menu-content hero-section" id="menu-primary">
            <h1 class="glow-text">Skat-König</h1>
            <div class="menu-buttons">
                <button id="btn-start-game" class="btn primary play-now-btn" onclick="window.location.href='play.html'">Play Now</button>
                <button id="btn-start-ramsch" class="btn btn-outline" style="margin-top: 15px; width: 100%; max-width: 250px;" onclick="window.location.href='play.html?mode=ramsch'">Ramsch</button>
            </div>
        </div>
        <div class="version-hint">Skat-König v0.4.2</div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/challenges.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.appSettings = new Settings();
            window.ui = new UI();
            window.ui.updateLanguageUI();
        });
    </script>
</body>

</html>
