<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skat - Minimalist Web Game</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Top Bots Area -->
        <div id="bots-area">
            <div id="bot2" class="player-zone">
                <div class="player-info"><span class="ai-text">Ai</span>core <span class="score">0</span></div>
                <div class="cards-container bot-cards"></div>
                <div class="speech-bubble hidden"></div>
            </div>
            <div id="bot1" class="player-zone">
                <div class="player-info"><span class="ai-text">Ai</span>den <span class="score">0</span></div>
                <div class="cards-container bot-cards"></div>
                <div class="speech-bubble hidden"></div>
            </div>
        </div>

        <!-- Center Table Area -->
        <div id="table-area">
            <div id="trick-zone">
                <div id="played-card-bot2" class="played-card-slot"></div>
                <div id="played-card-bot1" class="played-card-slot"></div>
                <div id="played-card-player" class="played-card-slot"></div>
            </div>
            
            <div id="skat-zone" class="hidden">
                <div class="card-slot"></div>
                <div class="card-slot"></div>
            </div>

            <!-- Overlays for Bidding & Trump Selection -->
            <div id="bidding-overlay" class="overlay hidden">
                <h2>Reizen</h2>
                <div id="bidding-controls">
                    <p id="bidding-status">Warte auf Reiz-Phase...</p>
                    <div class="button-group">
                        <button id="btn-pass" class="btn">Passen</button>
                        <button id="btn-bid" class="btn primary">Halten / Reizen</button>
                    </div>
                </div>
            </div>

            <div id="skat-decision-overlay" class="overlay hidden">
                <h2>Skat aufnehmen?</h2>
                <div class="button-group">
                    <button id="btn-skat-hand" class="btn">Hand spielen</button>
                    <button id="btn-skat-take" class="btn primary">Aufnehmen</button>
                </div>
                <!-- Skat discard area -->
                <div id="skat-discard-area" class="hidden">
                    <p>Lege 2 Karten in den Skat (Drag & Drop oder Klick)</p>
                    <div id="skat-discard-slots">
                        <div class="skat-slot droppable" data-index="0"></div>
                        <div class="skat-slot droppable" data-index="1"></div>
                    </div>
                    <button id="btn-confirm-skat" class="btn primary" disabled>Bestätigen</button>
                </div>
            </div>

            <div id="trump-overlay" class="overlay hidden">
                <h2>Trumpf wählen</h2>
                <div id="trump-options">
                    <button class="btn trump-btn" data-suit="Eichel">Eichel <img src="media/eichel.png" class="suit-icon" alt="Eichel"></button>
                    <button class="btn trump-btn" data-suit="Grün">Grün <img src="media/gruen.png" class="suit-icon" alt="Grün"></button>
                    <button class="btn trump-btn" data-suit="Rot">Rot <img src="media/rot.png" class="suit-icon" alt="Rot"></button>
                    <button class="btn trump-btn" data-suit="Schellen">Schellen <img src="media/schellen.png" class="suit-icon" alt="Schellen"></button>
                    <button class="btn trump-btn" data-suit="Grand">Grand</button>
                    <button class="btn trump-btn" data-suit="Null">Null</button>
                </div>
            </div>
            
            <div id="game-over-overlay" class="overlay hidden">
                <h2>Spielende</h2>
                <div id="results"></div>
                <button id="btn-restart" class="btn primary">Neues Spiel</button>
            </div>
        </div>

        <!-- Bottom Player Area -->
        <div id="player-area" class="player-zone">
            <div class="game-info">
                <div id="current-declarer">Alleinspieler: -</div>
                <div id="current-trump">Trumpf: -</div>
                <div id="current-turn">Zug: -</div>
            </div>
            <div class="player-info">Du <span class="score">0</span></div>
            <div id="player-hand" class="cards-container player-cards"></div>
            <div class="speech-bubble hidden"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/cards.js"></script>
    <script src="js/biddingEngine.js"></script>
    <script src="js/botBidding.js"></script>
    <script src="js/biddingController.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/game.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
