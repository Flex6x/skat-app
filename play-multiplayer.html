<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Skat</title>
    <link rel="icon" type="image/jpeg" href="media/logo.jpg">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container" class="hidden">
        <!-- Info Box Top Center (Same as play.html) -->
        <div class="game-info-container">
            <div class="game-info-top">
                <div id="current-declarer"><span>Alleinspieler</span>: -</div>
                <div id="current-bid"><span>Reizwert</span>: -</div>
                <div id="current-trump"><span>Trumpf</span>: -</div>
                <div id="current-turn"><span>Zug</span>: -</div>
                <div id="live-score" class="live-score hidden"><span>Punkte</span>: -</div>
            </div>

            <!-- Controls below info -->
            <div class="game-controls-bottom" style="display: flex; gap: 15px; margin-top: 10px;">
                <button id="btn-home" class="floating-btn">🏠</button>
                <button id="btn-show-scoreboard" class="floating-btn">📋</button>
            </div>
        </div>

        <!-- Bots Area (Same layout) -->
        <div id="bots-area">
            <div id="bot2" class="player-zone">
                <div class="player-info"><span class="ai-text">Bot</span>1</div>
                <div class="cards-container bot-cards"></div>
            </div>
            <div id="bot1" class="player-zone">
                <div class="player-info"><span class="ai-text">Bot</span>2</div>
                <div class="cards-container bot-cards"></div>
            </div>
        </div>

        <!-- Table Area (Same layout) -->
        <div id="table-area">
            <div id="trick-zone">
                <div id="played-card-bot2" class="played-card-slot"></div>
                <div id="played-card-bot1" class="played-card-slot"></div>
                <div id="played-card-player" class="played-card-slot"></div>
            </div>

            <!-- Game Over Overlay -->
            <div id="game-over-overlay" class="overlay hidden">
                <h2 id="game-result-msg">Spiel beendet</h2>
                <div id="results"></div>
                <button id="btn-restart" class="btn primary">Neues Spiel</button>
            </div>

            <!-- Loading Overlay -->
            <div id="loading-overlay" class="overlay">
                <h2>Verbinden...</h2>
                <p id="loading-status">Verbindung zum Server wird hergestellt...</p>
            </div>

            <!-- Error Overlay -->
            <div id="error-overlay" class="overlay hidden">
                <h2>❌ Fehler</h2>
                <p id="error-message"></p>
                <button class="btn primary" onclick="window.location.href='index.html'">Zurück zum Menü</button>
            </div>
        </div>

        <!-- Player Area (Same layout) -->
        <div id="player-area" class="player-zone">
            <div class="player-info">Du (Spieler)</div>
            <div id="player-hand" class="cards-container player-cards"></div>
        </div>
    </div>

    <!-- Scoreboard Drawer -->
    <div id="scoreboard-drawer" class="drawer hidden">
        <div class="drawer-header">
            <h2>Spielliste</h2>
            <button id="btn-close-scoreboard" class="btn-close">×</button>
        </div>
        <div class="drawer-content">
            <table id="scoreboard-table">
                <thead>
                    <tr>
                        <th style="width: 40px;">#</th>
                        <th id="player0-name">Bot1</th>
                        <th id="player1-name">Bot2</th>
                        <th id="player2-name-list">Du</th>
                    </tr>
                </thead>
                <tbody id="scoreboard-body">
                    <!-- Rows added by JS -->
                </tbody>
                <tfoot>
                    <tr class="total-row">
                        <td id="total-player-num">Total</td>
                        <td id="total-player0">0</td>
                        <td id="total-player1">0</td>
                        <td id="total-player2">0</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script src="js/socketClient.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/cards.js"></script>
    <script>
        class SimpleMultiplayerGame {
            constructor() {
                this.socket = new SocketClient();
                this.gameContainer = document.getElementById('game-container');
                this.loadingOverlay = document.getElementById('loading-overlay');
                this.errorOverlay = document.getElementById('error-overlay');
                this.gameOverOverlay = document.getElementById('game-over-overlay');
                this.scoreboard = document.getElementById('scoreboard-table');
                this.gameHistory = [];
                this.playerId = null;
                this.setupEventListeners();
            }

            setupEventListeners() {
                document.getElementById('btn-home').addEventListener('click', () => {
                    this.socket.disconnect();
                    window.location.href = 'index.html';
                });

                document.getElementById('btn-show-scoreboard').addEventListener('click', () => {
                    document.getElementById('scoreboard-drawer').classList.toggle('hidden');
                });

                document.getElementById('btn-close-scoreboard').addEventListener('click', () => {
                    document.getElementById('scoreboard-drawer').classList.add('hidden');
                });

                document.getElementById('btn-restart').addEventListener('click', () => {
                    window.location.reload();
                });

                // Socket-Events
                this.socket.on('stateUpdate', (data) => this.onStateUpdate(data));
                this.socket.on('gameFinished', (result) => this.onGameFinished(result));
                this.socket.on('errorOccurred', (data) => this.onError(data));
            }

            async start() {
                try {
                    this.showLoading('Verbinde zum Server...');
                    await this.socket.connect('http://localhost:3000');
                    this.playerId = this.socket.playerId;

                    this.showLoading('Trete Spiel bei...');
                    const playerName = `Player_${Math.random().toString(36).substring(7)}`;
                    await this.socket.joinGame(playerName);

                    this.hideLoading();
                    this.gameContainer.classList.remove('hidden');
                    this.showLoading('Warte auf Spielstart...');
                } catch (error) {
                    this.showError(`Fehler beim Verbinden: ${error.message}`);
                }
            }

            onStateUpdate(data) {
                if (data.phase === 'initializing') {
                    this.showLoading('Warte auf alle Spieler...');
                    return;
                }

                this.hideLoading();

                // Update UI with better information
                const declarer = data.skatEngine?.declarer !== undefined ? data.skatEngine.declarer : '-';
                const bid = data.skatEngine?.bidValue || 0;
                const trump = this.getTrumpName(data.skatEngine?.trumpMode);
                
                document.getElementById('current-declarer').textContent = `Alleinspieler: Spieler ${declarer}`;
                document.getElementById('current-bid').textContent = `Reizwert: ${bid}`;
                document.getElementById('current-trump').textContent = `Trumpf: ${trump}`;
                document.getElementById('current-turn').textContent = `Zug: ${data.phase}`;

                // Render cards - get filtered state for this player
                const myState = data.filteredStates?.find(s => s.playerId === this.playerId);
                if (myState?.state) {
                    this.renderHand(myState.state.myHand || []);
                    this.renderBotCards(data);
                    this.renderCurrentTrick(myState.state.currentTrick || []);
                }
            }

            getTrumpName(trump) {
                if (!trump) return '-';
                const trumpMap = {
                    'eichel': '🌰 Eichel',
                    'gruen': '🍃 Grün',
                    'rot': '❤️ Rot',
                    'schellen': '🔔 Schellen',
                    'grand': '🎭 Grand',
                    'ramsch': '💥 Ramsch'
                };
                return trumpMap[trump] || trump;
            }

            renderBotCards(data) {
                // Show bot card counts (not actual cards)
                const bot1Container = document.querySelector('#bot1 .bot-cards');
                const bot2Container = document.querySelector('#bot2 .bot-cards');
                
                if (bot1Container && bot2Container) {
                    bot1Container.innerHTML = '';
                    bot2Container.innerHTML = '';
                    
                    // Get number of cards for each bot
                    const botCounts = data.skatEngine?.playerCardCounts || [10, 10, 10];
                    
                    for (let i = 0; i < botCounts[0]; i++) {
                        const card = document.createElement('div');
                        card.className = 'card card-back';
                        bot1Container.appendChild(card);
                    }
                    
                    for (let i = 0; i < botCounts[1]; i++) {
                        const card = document.createElement('div');
                        card.className = 'card card-back';
                        bot2Container.appendChild(card);
                    }
                }
            }

            renderHand(hand) {
                const handContainer = document.getElementById('player-hand');
                handContainer.innerHTML = '';

                if (!Array.isArray(hand)) return;

                hand.forEach((card) => {
                    const cardEl = this.createCardElement(card);
                    cardEl.style.cursor = 'pointer';
                    cardEl.addEventListener('click', () => this.playCard(card));
                    handContainer.appendChild(cardEl);
                });
            }

            renderCurrentTrick(trick) {
                const slots = [
                    document.getElementById('played-card-bot2'),
                    document.getElementById('played-card-bot1'),
                    document.getElementById('played-card-player')
                ];

                slots.forEach(slot => slot.innerHTML = '');

                if (Array.isArray(trick)) {
                    trick.forEach((card, idx) => {
                        if (slots[idx] && card) {
                            slots[idx].appendChild(this.createCardElement(card));
                        }
                    });
                }
            }

            createCardElement(card) {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                
                if (card.rank && card.suit) {
                    // Use card display names if available
                    const rankDisplay = {
                        '6': '6', '7': '7', '8': '8', '9': '9', '10': '10',
                        'J': 'B', 'Q': 'D', 'K': 'K', 'A': 'A'
                    }[card.rank] || card.rank;
                    
                    const suitDisplay = {
                        'eichel': '🌰', 'gruen': '🍃', 'rot': '❤️', 'schellen': '🔔'
                    }[card.suit] || card.suit;
                    
                    cardEl.textContent = `${suitDisplay}${rankDisplay}`;
                    cardEl.style.color = ['rot', 'schellen'].includes(card.suit) ? '#d32f2f' : '#2e7d32';
                } else {
                    cardEl.textContent = String(card);
                }
                
                return cardEl;
            }

            playCard(card) {
                this.socket.sendPlayerAction({
                    type: 'PLAY_CARD',
                    payload: { card }
                });
            }

            onGameFinished(result) {
                this.gameHistory.push(result);
                this.updateScoreboard();

                const resultsDiv = document.getElementById('results');
                const won = result.declarer === this.playerId ? result.won : !result.won;
                resultsDiv.innerHTML = `
                    <p><strong>Spiel vorbei!</strong></p>
                    <p>Alleinspieler: Spieler ${result.declarer}</p>
                    <p>Punkte: ${result.points || 0}</p>
                    <p>${won ? '✅ Du hast gewonnen!' : '❌ Du hast verloren!'}</p>
                `;

                this.gameOverOverlay.classList.remove('hidden');
            }

            updateScoreboard() {
                const tbody = document.getElementById('scoreboard-body');
                tbody.innerHTML = '';

                this.gameHistory.forEach((game, idx) => {
                    const row = document.createElement('tr');
                    const won = game.declarer === this.playerId ? game.won : !game.won;
                    row.innerHTML = `
                        <td>${idx + 1}</td>
                        <td>-</td>
                        <td>-</td>
                        <td>${won ? '✓' : '✗'}</td>
                    `;
                    tbody.appendChild(row);
                });
            }

            showLoading(message) {
                document.getElementById('loading-status').textContent = message;
                this.loadingOverlay.classList.remove('hidden');
            }

            hideLoading() {
                this.loadingOverlay.classList.add('hidden');
            }

            showError(message) {
                document.getElementById('error-message').textContent = message;
                this.errorOverlay.classList.remove('hidden');
                this.loadingOverlay.classList.add('hidden');
            }

            onError(data) {
                this.showError(data.message);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            window.appSettings = new Settings();
            const game = new SimpleMultiplayerGame();
            game.start();
        });
    </script>

    <style>
        #player-area {
            width: 100%;
            min-height: 150px;
        }

        #player-hand {
            flex-wrap: wrap;
        }

        .card {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 120px;
            margin: 5px;
            background: linear-gradient(135deg, #fff8dc, #fffacd);
            color: #333;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #d4af37;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            user-select: none;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 16px rgba(212, 175, 55, 0.5);
            background: linear-gradient(135deg, #fffacd, #ffff99);
        }

        .card:active {
            transform: translateY(-4px);
        }

        .card-back {
            background: repeating-linear-gradient(45deg,
                    #444,
                    #444 10px,
                    #333 10px,
                    #333 20px);
            border: 2px solid #fff;
            color: transparent !important;
            cursor: default !important;
        }

        .card-back:hover {
            transform: none !important;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3) !important;
            background: repeating-linear-gradient(45deg,
                    #555,
                    #555 10px,
                    #444 10px,
                    #444 20px);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        .overlay h2 {
            color: white;
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(63, 81, 181, 0.5);
        }

        .overlay p {
            color: #ccc;
            font-size: 1.1rem;
        }

        .overlay.hidden {
            display: none !important;
        }

        .drawer {
            position: fixed;
            right: 0;
            top: 0;
            width: 400px;
            height: 100%;
            background: linear-gradient(180deg, #1a1a2e 0%, #121212 100%);
            color: white;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 999;
            overflow-y: auto;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .drawer:not(.hidden) {
            transform: translateX(0);
        }

        .drawer-header {
            padding: 20px;
            border-bottom: 2px solid #3f51b5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(63, 81, 181, 0.1);
        }

        .drawer-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .btn-close {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-close:hover {
            transform: rotate(90deg);
        }

        .drawer-content {
            padding: 20px;
        }

        #scoreboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        #scoreboard-table th,
        #scoreboard-table td {
            padding: 12px 8px;
            border-bottom: 1px solid #333;
            text-align: center;
            color: #aaa;
        }

        #scoreboard-table th {
            background: rgba(63, 81, 181, 0.2);
            color: #3f51b5;
            font-weight: bold;
        }

        #scoreboard-table tr:hover {
            background: rgba(63, 81, 181, 0.1);
        }

        .total-row {
            background: rgba(63, 81, 181, 0.15);
            border-top: 2px solid #3f51b5;
            font-weight: bold;
        }

        #game-over-overlay {
            background: rgba(0, 0, 0, 0.95);
        }

        #results {
            background: rgba(63, 81, 181, 0.15);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #3f51b5;
            color: white;
        }

        #results p {
            margin: 8px 0;
            font-size: 1rem;
        }
    </style>
</body>

</html>
